include ~/.config/sway/vars.conf
include ~/.config/sway/vars_overrides.conf

input type:touchpad {
	dwt enabled
	tap enabled
	natural_scroll enabled
	drag_lock disabled
	middle_emulation enabled
		pointer_accel 0.5
		accel_profile "flat"
		scroll_factor 0.3
}

input type:keyboard {
	xkb_layout "pl"
	xkb_numlock enable
}

